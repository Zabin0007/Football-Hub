name: CI/CD Deployment

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend
        run: docker build -t zabin0007/football-hub-backend ./Backend

      - name: Push backend
        run: docker push zabin0007/football-hub-backend

      - name: Build frontend
        run: docker build -t zabin0007/football-hub-frontend ./frontend

      - name: Push frontend
        run: docker push zabin0007/football-hub-frontend

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd Football-Hub
            docker pull zabin0007/football-hub-backend
            docker pull zabin0007/football-hub-frontend
            docker-compose down
            docker-compose up -d