events {}

http {

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name thesoccer.art www.thesoccer.art;

        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name thesoccer.art www.thesoccer.art;

        ssl_certificate /etc/letsencrypt/live/thesoccer.art/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/thesoccer.art/privkey.pem;

        # Backend API - MUST come before frontend
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
        }
    }
}